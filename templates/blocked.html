{% extends "base.html" %}

{% block content %}
<div class="content-header">
    <div class="header-titles">
        <h2>Sites Bloqueados</h2>
        <p>Controle os domínios que o NetEye não deve aceder</p>
    </div>
</div>

<div class="card add-card mb-4">
    <div class="card-body">
        <form method="POST" action="{{ url_for('blocked') }}" class="row g-3 align-items-end">
            <div class="col-md-9">
                <label for="domain" class="form-label">Novo Domínio</label>
                <input type="text" id="domain" name="domain" class="form-control" required placeholder="Ex: facebook.com">
            </div>
            <div class="col-md-3">
                <button type="submit" class="btn btn-danger w-100">Bloquear</button>
            </div>
        </form>
    </div>
</div>

<div class="card entries-card">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-dark table-hover align-middle mb-0">
                <thead>
                    <tr>
                        <th>Domínio</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody>
                    {% for item in blocked %}
                    <tr>
                        <td class="fw-semibold">{{ item.dominio }}</td>
                        <td>
                            <a href="{{ url_for('delete_blocked', id=item.id) }}" class="btn btn-sm btn-outline-light">Desbloquear</a>
                        </td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="2" class="empty">Nenhum site bloqueado.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
