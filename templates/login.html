{% extends "base.html" %}

{% block auth %}
<div class="card border-secondary shadow-sm mt-5 mb-5">
    <div class="card-body p-4">
        <div class="text-center mb-4">
            <h1 class="h3 mb-2">NetEye</h1>
            <p class="text-secondary mb-0">Assistente de Voz Inteligente</p>
        </div>

        <form method="POST" class="needs-validation">
            <div class="mb-3">
                <label for="username" class="form-label">Nome de Utilizador</label>
                <input type="text" id="username" name="username" class="form-control" required autofocus placeholder="Ex: Herik">
            </div>

            <div class="mb-4">
                <label for="password" class="form-label">Senha</label>
                <input type="password" id="password" name="password" class="form-control" required placeholder="Insira a sua senha">
            </div>

            {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
            {% endif %}

            <button type="submit" class="btn btn-primary w-100">Entrar</button>
        </form>

        <div class="text-center mt-4 text-secondary">
            Ainda não tem conta? <a href="{{ url_for('register') }}">Registe-se aqui</a>
        </div>
    </div>
</div>
{% endblock %}
