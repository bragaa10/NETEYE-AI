{% extends "base.html" %}

{% block auth %}
<div class="card border-secondary shadow-sm mt-5 mb-5">
    <div class="card-body p-4">
        <div class="text-center mb-4">
            <h1 class="h3 mb-2">Registar NetEye</h1>
            <p class="text-secondary mb-0">Crie a sua conta para começar</p>
        </div>

        <form method="POST" class="needs-validation">
            <div class="mb-3">
                <label for="username" class="form-label">Nome de Utilizador</label>
                <input type="text" id="username" name="username" class="form-control" required autofocus placeholder="Como quer ser chamado?">
            </div>
            <div class="mb-3">
                <label for="api_key" class="form-label">Chave API Anthropic (Claude)</label>
                <input type="password" id="api_key" name="api_key" class="form-control" required placeholder="sk-ant-...">
                <div class="form-text text-secondary">A chave deve começar por <code>sk-ant-</code></div>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Senha</label>
                <input type="password" id="password" name="password" class="form-control" required placeholder="Mínimo 6 caracteres">
            </div>
            <div class="mb-4">
                <label for="confirm_password" class="form-label">Confirmar Senha</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control" required placeholder="Repita a senha">
            </div>

            {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
            {% endif %}

            <button type="submit" class="btn btn-primary w-100">Criar Conta</button>
        </form>

        <div class="text-center mt-4 text-secondary">
            Já tem conta? <a href="{{ url_for('login') }}">Inicie sessão</a>
        </div>
    </div>
</div>
{% endblock %}
