<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetEye — Assistente de Voz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-dark text-white">
    <nav class="navbar navbar-dark bg-dark border-bottom border-secondary shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="{{ url_for('dashboard') }}">
                <span class="brand-eye">👁</span>
                <span>NetEye</span>
            </a>
            {% if user %}
            <div class="ms-auto d-flex align-items-center gap-2">
                <span class="badge rounded-pill bg-secondary text-white">{{ user }}</span>
                <a href="{{ url_for('logout') }}" class="btn btn-outline-danger btn-sm">Sair</a>
            </div>
            {% endif %}
        </div>
    </nav>

    {% if user %}
    <div class="bg-dark border-bottom border-secondary">
        <div class="container-fluid">
            <ul class="nav nav-pills py-3 flex-row flex-wrap gap-2">
                <li class="nav-item">
                    <a class="nav-link text-white {% if request.path == url_for('dashboard') or request.path == '/' %}active{% endif %}" href="{{ url_for('dashboard') }}">📊 Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white {% if request.path == url_for('favorites') %}active{% endif %}" href="{{ url_for('favorites') }}">⭐ Favoritos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white {% if request.path == url_for('blocked') %}active{% endif %}" href="{{ url_for('blocked') }}">🚫 Bloqueados</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white {% if request.path == url_for('history') %}active{% endif %}" href="{{ url_for('history') }}">📜 Histórico</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white {% if request.path == url_for('settings') %}active{% endif %}" href="{{ url_for('settings') }}">⚙️ Configurações</a>
                </li>
            </ul>
        </div>
    </div>
    <div class="container-xl py-5">
        <div class="row">
            <div class="col-12">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>
    {% else %}
    <div class="container-xl auth-shell">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-7">
                {% block auth %}{% endblock %}
            </div>
        </div>
    </div>
    {% endif %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
